<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JVL Pharmacy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* สไตล์ความหรูหราแบบ Formal */
        .glass-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .gradient-text { background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-btn { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; transition: all 0.3s; }
        .gradient-btn:hover { box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); transform: translateY(-2px); }
        
        /* Animation & Sidebar */
        .sidebar { transition: transform 0.3s ease-in-out; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="auth-section" class="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50">
        <div class="glass-card p-8 w-full max-w-md relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-purple-600"></div>
            
            <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="Logo" class="h-24 mx-auto mb-6 object-contain">
            <h1 class="text-2xl font-bold text-center mb-2 gradient-text">JVL Pharmacy Portal</h1>
            <p class="text-center text-gray-500 mb-6 text-sm">โรงพยาบาลจิตเวชเลยราชนครินทร์</p>
            
            <div id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-1 text-gray-700">Username</label>
                    <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-1 text-gray-700">Password</label>
                    <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <button onclick="login()" class="w-full gradient-btn font-bold py-3 rounded-lg">เข้าสู่ระบบ</button>
                <div class="flex justify-between mt-4 text-sm text-gray-500 font-semibold">
                    <a href="#" onclick="toggleAuth('register')" class="hover:text-blue-600">สมัครสมาชิกใหม่</a>
                    <a href="#" class="hover:text-blue-600">ลืมรหัสผ่าน?</a>
                </div>
                <div class="my-6 border-b border-gray-200 relative text-center">
                    <span class="bg-white px-3 text-gray-400 text-sm absolute -top-2.5 left-1/2 transform -translate-x-1/2">หรือ</span>
                </div>
                <button onclick="guestLogin()" class="w-full bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 font-bold py-3 rounded-lg transition">เข้าชมแบบผู้เยี่ยมชม (Guest)</button>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="reg-username" placeholder="ตั้ง Username" class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="email" id="reg-email" placeholder="E-mail" class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="reg-password" placeholder="ตั้ง Password" class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <label class="flex items-start space-x-2 text-sm mb-6 text-gray-600">
                    <input type="checkbox" id="pdpa-consent" class="mt-1">
                    <span>ข้าพเจ้ายินยอมให้นำข้อมูลส่วนบุคคลไปประมวลผลตาม พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล (PDPA)</span>
                </label>
                <button onclick="register()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition shadow-md">ยืนยันสมัครสมาชิก</button>
                <div class="text-center mt-4">
                    <a href="#" onclick="toggleAuth('login')" class="text-sm text-gray-500 font-semibold hover:text-blue-600">ย้อนกลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </div>
        </div>
    </div>

    <div id="portal-section" class="hidden flex h-screen bg-gray-50">
        
        <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-xl transform -translate-x-full md:translate-x-0 md:relative flex flex-col h-full">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-blue-50 to-indigo-50">
                <div class="flex items-center gap-2">
                    <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" class="h-8">
                    <span class="font-bold text-sm text-gray-800">JVL Portal</span>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-800"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1">
                <p class="text-xs font-semibold text-gray-400 uppercase mb-2">เมนูหลัก</p>
                <div class="mb-2">
                    <button onclick="toggleAccordion('acc-apps')" class="w-full flex justify-between items-center text-left p-3 hover:bg-gray-100 rounded-lg text-gray-700 font-semibold">
                        <span><i class="fas fa-th-large w-6 text-blue-500"></i> แอปพลิเคชัน</span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="acc-apps" class="accordion-content px-4">
                        <a href="#" class="block p-2 text-sm text-gray-600 hover:text-blue-600">- ทั้งหมด</a>
                    </div>
                </div>

                <div id="management-menu" class="hidden mb-2">
                    <button onclick="toggleAccordion('acc-manage')" class="w-full flex justify-between items-center text-left p-3 hover:bg-gray-100 rounded-lg text-gray-700 font-semibold">
                        <span><i class="fas fa-cogs w-6 text-purple-500"></i> จัดการระบบ</span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="acc-manage" class="accordion-content px-4">
                        <a href="#" onclick="openManageModal()" class="block p-2 text-sm text-gray-600 hover:text-blue-600">- เพิ่ม Link / Shortcut</a>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold"><i class="fas fa-user"></i></div>
                    <div>
                        <p id="display-username" class="text-sm font-bold text-gray-800">User</p>
                        <p id="display-role" class="text-xs text-green-500">Online</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2 rounded-lg text-sm transition border border-red-200">
                    <i class="fas fa-sign-out-alt mr-2"></i> ออกจากระบบ
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white shadow-sm p-4 flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-600 hover:text-gray-900 focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div class="relative w-full max-w-xl">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="searchBar" onkeyup="searchApps()" placeholder="ค้นหา Application / ระบบงาน..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                </div>
            </header>

            <div class="flex-1 p-4 md:p-8 overflow-y-auto">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-l-4 border-blue-500 pl-3">ระบบงานทั้งหมด</h2>
                <div id="app-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="manage-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 z-[60]">
        <div class="glass-card p-6 w-full max-w-md">
            <h3 class="text-lg font-bold mb-4 text-gray-800">เพิ่ม Shortcut / ระบบงาน</h3>
            <input type="text" id="app-name" placeholder="ชื่อระบบงาน" class="w-full mb-3 p-2 border rounded">
            <input type="text" id="app-url" placeholder="URL Link (เช่น https://...)" class="w-full mb-3 p-2 border rounded">
            <input type="text" id="app-desc" placeholder="คำอธิบายสั้นๆ" class="w-full mb-3 p-2 border rounded">
            <select id="app-level" class="w-full mb-4 p-2 border rounded text-gray-700">
                <option value="0">Public (ทุกคนเห็นได้)</option>
                <option value="1">Internal (ต้องล็อกอิน)</option>
                <option value="2">Admin Only (เฉพาะ Admin)</option>
            </select>
            <div class="flex justify-end gap-2">
                <button onclick="closeManageModal()" class="px-4 py-2 bg-gray-200 rounded text-gray-700 hover:bg-gray-300">ยกเลิก</button>
                <button onclick="saveApp()" class="px-4 py-2 gradient-btn rounded text-white font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 z-[60]">
        <div class="glass-card p-8 rounded-2xl max-w-sm w-full text-center relative">
            <button onclick="closeQR()" class="absolute top-2 right-4 text-2xl font-bold text-gray-500 hover:text-gray-800">&times;</button>
            <h3 id="qr-app-title" class="font-bold text-xl mb-4 text-gray-800"></h3>
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <a id="qr-app-link" href="#" target="_blank" class="block gradient-btn py-2 rounded-lg font-bold">เปิดลิงก์นี้ทันที</a>
        </div>
    </div>

    <script>
        // 🚨 อัปเดต URL Web App ของคุณที่นี่
        const API_URL = "https://script.google.com/macros/s/AKfycbwXSuVt0YB34pHhyDK-O_xfaZ03nbUAPvQYBaoiQtdokOur8aEez8inwmtxzWhGWDNG8g/exec"; 
        
        let currentUser = { username: "", role: 0 }; 
        let allApps = [];

        // UI Controls
        function toggleAuth(mode) {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'register');
            document.getElementById('register-form').classList.toggle('hidden', mode === 'login');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            if (content.style.maxHeight) { content.style.maxHeight = null; } 
            else { content.style.maxHeight = content.scrollHeight + "px"; }
        }

        // API Fetcher
        async function fetchAPI(action, payload) {
            Swal.fire({title: 'กำลังประมวลผล...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, payload }) });
                const data = await res.json();
                Swal.close();
                return data;
            } catch (err) {
                Swal.close();
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        }

        // Auth Logic
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetchAPI('login', { username: user, password: pass });
            if(res && res.success) enterPortal(res.user.roleLevel, res.user.username);
            else Swal.fire('ล้มเหลว', res.message, 'error');
        }

        async function register() {
            if(!document.getElementById('pdpa-consent').checked) return Swal.fire('คำเตือน', 'กรุณายอมรับนโยบาย PDPA', 'warning');
            const payload = {
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                pdpa: true
            };
            const res = await fetchAPI('register', payload);
            if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); toggleAuth('login'); }
            else Swal.fire('ล้มเหลว', res.message, 'error');
        }

        function guestLogin() { enterPortal(0, 'Guest'); }

        async function enterPortal(roleLevel, username) {
            currentUser = { username: username, role: parseInt(roleLevel) };
            
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('portal-section').classList.remove('hidden');
            document.getElementById('display-username').innerText = username;
            
            let roleName = roleLevel == 0 ? "ผู้เยี่ยมชม (Guest)" : roleLevel == 1 ? "เจ้าหน้าที่ (User)" : "ผู้ดูแลระบบ (Admin)";
            document.getElementById('display-role').innerText = roleName;

            // เปิดเมนู "จัดการระบบ" เฉพาะ User และ Admin
            if(currentUser.role > 0) document.getElementById('management-menu').classList.remove('hidden');
            else document.getElementById('management-menu').classList.add('hidden');

            loadApps();
        }

        function logout() { location.reload(); } // รีโหลดหน้าเพื่อล้าง State

        async function loadApps() {
            const res = await fetchAPI('getApps', { roleLevel: currentUser.role });
            if(res && res.success) { allApps = res.data; renderApps(allApps); }
        }

        // App Render Logic
        function renderApps(appsToRender) {
            const grid = document.getElementById('app-grid');
            grid.innerHTML = '';
            appsToRender.forEach(app => {
                // ตรวจสอบสิทธิ์ว่าเป็นเจ้าของ หรือเป็น Admin ถึงจะมีปุ่มลบ
                let canEdit = (currentUser.role === 2) || (currentUser.role === 1 && app.createdBy === currentUser.username);
                let btnHtml = canEdit ? `<button onclick="deleteApp('${app.id}', event)" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fas fa-trash-alt text-sm"></i></button>` : '';

                grid.innerHTML += `
                    <div class="glass-card hover:-translate-y-1 transition duration-300 p-4 flex flex-col items-center text-center cursor-pointer relative group" onclick="showQR('${app.name}', '${app.url}')">
                        ${btnHtml}
                        <div class="w-14 h-14 bg-gradient-to-br from-blue-100 to-purple-100 rounded-2xl flex items-center justify-center mb-3 shadow-sm border border-blue-50">
                            <img src="${app.icon || 'https://cdn-icons-png.flaticon.com/512/2800/2800015.png'}" alt="icon" class="w-8 h-8 object-contain">
                        </div>
                        <h3 class="font-bold text-sm text-gray-800 leading-tight line-clamp-2 w-full">${app.name}</h3>
                        <p class="text-xs text-gray-400 mt-1 line-clamp-1 w-full">${app.description || ''}</p>
                    </div>
                `;
            });
        }

        function searchApps() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            renderApps(allApps.filter(app => app.name.toLowerCase().includes(query) || (app.description && app.description.toLowerCase().includes(query))));
        }

        // Add & Delete Logic
        function openManageModal() { document.getElementById('manage-modal').classList.remove('hidden'); }
        function closeManageModal() { document.getElementById('manage-modal').classList.add('hidden'); }

        async function saveApp() {
            const payload = {
                mode: 'add',
                username: currentUser.username,
                userRole: currentUser.role,
                appName: document.getElementById('app-name').value,
                appUrl: document.getElementById('app-url').value,
                desc: document.getElementById('app-desc').value,
                accessLevel: document.getElementById('app-level').value
            };
            if(!payload.appName || !payload.appUrl) return Swal.fire('แจ้งเตือน', 'กรุณากรอกชื่อและ URL', 'warning');

            const res = await fetchAPI('manageApp', payload);
            if(res.success) {
                Swal.fire('สำเร็จ', 'เพิ่มรายการเรียบร้อย', 'success');
                closeManageModal();
                loadApps();
            } else { Swal.fire('ผิดพลาด', res.message, 'error'); }
        }

        async function deleteApp(appId, event) {
            event.stopPropagation(); // ไม่ให้คลิกแล้วเด้ง QR Code
            const confirm = await Swal.fire({ title: 'ยืนยันการลบ?', text: "รายการนี้จะถูกลบออกจากระบบ", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบทิ้ง' });
            if (confirm.isConfirmed) {
                const res = await fetchAPI('manageApp', { mode: 'delete', appId: appId, username: currentUser.username, userRole: currentUser.role });
                if(res.success) loadApps();
                else Swal.fire('ผิดพลาด', res.message, 'error');
            }
        }

        // QR Code
        function showQR(name, url) {
            document.getElementById('qr-modal').classList.remove('hidden');
            document.getElementById('qr-app-title').innerText = name;
            document.getElementById('qr-app-link').href = url;
            document.getElementById('qrcode').innerHTML = ''; 
            new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180, colorDark : "#1e293b" });
        }
        function closeQR() { document.getElementById('qr-modal').classList.add('hidden'); }
    </script>
</body>
</html>
